data:
  movielens_dir: data/raw/ml-latest
  metadata_dir: data/raw/the-movies-dataset
  processed_dir: data/processed
  output_dir: data/outputs
  max_users_for_training: 1200
  max_ratings_for_training: 180000
  min_movie_ratings_after_sampling: 5

split:
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  strategy: per_user_time
  positive_threshold: 4.0

models:
  top_k: 12
  min_rating_count: 20
  usercf_neighbors: 80
  itemcf_neighbors: 100
  mf_factors: 80
  mf_epochs: 30

usercf:
  neighbors: 80
  shrinkage: 10
  min_common_items: 2

itemcf:
  neighbors: 100
  use_positive_history_only: true
  normalize_scores: true

mf:
  factors: 80
  epochs: 30
  lr: 0.005
  reg: 0.05

content:
  max_features: 30000
  ngram_range: [1, 2]
  use_weighted_fields: true

hybrid:
  popularity: 0.05
  usercf: 0.10
  itemcf: 0.45
  mf: 0.25
  content: 0.15
  tune_weights: true
  optimize_metric: ndcg@10
  recall_top: 300
  default_weights:
    popularity: 0.05
    usercf: 0.10
    itemcf: 0.45
    mf: 0.25
    content: 0.15
  candidate_weights:
    - {popularity: 0.05, usercf: 0.10, itemcf: 0.45, mf: 0.25, content: 0.15}
    - {popularity: 0.05, usercf: 0.15, itemcf: 0.40, mf: 0.25, content: 0.15}
    - {popularity: 0.10, usercf: 0.10, itemcf: 0.40, mf: 0.30, content: 0.10}
    - {popularity: 0.05, usercf: 0.10, itemcf: 0.35, mf: 0.35, content: 0.15}
    - {popularity: 0.05, usercf: 0.05, itemcf: 0.50, mf: 0.30, content: 0.10}
    - {popularity: 0.10, usercf: 0.15, itemcf: 0.35, mf: 0.25, content: 0.15}
    - {popularity: 0.20, usercf: 0.10, itemcf: 0.30, mf: 0.25, content: 0.15}
    - {popularity: 0.25, usercf: 0.10, itemcf: 0.30, mf: 0.25, content: 0.10}
    - {popularity: 0.20, usercf: 0.05, itemcf: 0.40, mf: 0.25, content: 0.10}
    - {popularity: 0.00, usercf: 0.05, itemcf: 0.70, mf: 0.15, content: 0.10}
    - {popularity: 0.05, usercf: 0.05, itemcf: 0.65, mf: 0.20, content: 0.05}
    - {popularity: 0.00, usercf: 0.10, itemcf: 0.60, mf: 0.20, content: 0.10}
    - {popularity: 0.05, usercf: 0.10, itemcf: 0.60, mf: 0.15, content: 0.10}
    - {popularity: 0.00, usercf: 0.05, itemcf: 0.75, mf: 0.10, content: 0.10}
    - {popularity: 0.30, usercf: 0.05, itemcf: 0.35, mf: 0.20, content: 0.10}
    - {popularity: 0.35, usercf: 0.05, itemcf: 0.30, mf: 0.20, content: 0.10}

evaluation:
  k: 10
  positive_threshold: 4.0
  max_eval_users: 200
  max_users: 200
  sampled_eval:
    enabled: true
    num_negatives: 99
    max_users: 200
    seed: 42
    popaware:
      enabled: true
      num_buckets: 10
      adjacent_buckets: 1
      prefer_harder: true

tmdb:
  image_base_url: https://image.tmdb.org/t/p
  poster_size: w500
  backdrop_size: original
  verify_posters: true
  verify_workers: 64
  fetch_workers: 32
  batch_size: 500

app:
  cache_users: [1, 2, 3, 4, 5]
  default_poster: https://placehold.co/500x750?text=No+Poster
  default_backdrop: https://placehold.co/1200x675?text=No+Backdrop
